<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>초성 게임</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans KR', 'Inter', sans-serif;
            background-color: #f3f4f6;
            background-image: radial-gradient(#e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* Custom Animations */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .result-card {
            transition: all 0.2s ease-in-out;
        }
        
        .result-card:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        /* Toast Animation */
        @keyframes slideInUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes fadeOut {
            from { opacity: 1; }
            to { opacity: 0; }
        }
        .toast-enter {
            animation: slideInUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .toast-exit {
            animation: fadeOut 0.3s ease-in forwards;
        }

        /* Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #3b82f6;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <main class="w-full max-w-md bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100 relative">
        
        <!-- Header -->
        <div class="bg-blue-600 p-6 text-white text-center rounded-t-3xl relative overflow-hidden">
            <div class="absolute -top-10 -right-10 w-32 h-32 bg-white/10 rounded-full blur-2xl"></div>
            <div class="absolute -bottom-8 -left-8 w-24 h-24 bg-blue-400/30 rounded-full blur-xl"></div>
            <h1 class="text-3xl font-black mb-2 relative z-10 tracking-tight">초성 게임 🎯</h1>
            <p class="text-blue-100 text-sm font-medium relative z-10">주제를 고르고 자음을 입력해보세요!</p>
        </div>

        <!-- Content -->
        <div class="p-6 space-y-6">
            
            <!-- Topic Selection -->
            <div class="space-y-2">
                <label for="topic" class="block text-sm font-bold text-gray-700">주제 선택</label>
                <div class="relative">
                    <select id="topic" class="w-full appearance-none bg-gray-50 border border-gray-200 text-gray-800 text-base rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 transition-shadow">
                        <option value="동물">🦁 동물</option>
                        <option value="과일/채소">🍎 과일 및 채소</option>
                        <option value="음식">🍔 음식</option>
                        <option value="나라">🌎 나라 (국가명)</option>
                        <option value="직업">👨‍🍳 직업</option>
                        <option value="일상용품">📱 일상용품 / 사물</option>
                        <option value="영화/드라마">🎬 영화 및 드라마</option>
                        <option value="랜덤">🎲 랜덤 (아무거나)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>
            </div>

            <!-- Choseong Input -->
            <div class="space-y-2">
                <label for="choseong" class="block text-sm font-bold text-gray-700">초성 1개 입력 (예: ㄱ, ㅅ)</label>
                <input type="text" id="choseong" placeholder="자음 1개만 입력하세요" autocomplete="off" maxlength="1" class="w-full bg-gray-50 border border-gray-200 text-gray-900 text-lg rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 block p-3.5 font-bold tracking-widest placeholder:text-gray-400 placeholder:font-normal transition-shadow">
                <p class="text-xs text-gray-500 mt-1 pl-1">* 한 글자 단어는 나오지 않아요!</p>
            </div>

            <!-- Action Button -->
            <button id="submitBtn" class="w-full text-white bg-blue-600 hover:bg-blue-700 focus:ring-4 focus:ring-blue-300 font-bold rounded-xl text-lg px-5 py-4 text-center transition-colors shadow-md shadow-blue-500/30 flex justify-center items-center gap-2 active:scale-[0.98]">
                <span>단어 찾기</span>
                <div id="loadingSpinner" class="loader hidden"></div>
            </button>

            <!-- Results Area -->
            <div id="resultsContainer" class="hidden mt-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-sm font-bold text-gray-500 uppercase tracking-wider">발견된 단어 (3가지)</h3>
                    <span id="resultBadge" class="bg-blue-100 text-blue-800 text-xs font-bold px-2.5 py-0.5 rounded-full"></span>
                </div>
                <div id="wordsList" class="grid gap-3">
                    <!-- Cards will be injected here -->
                </div>
            </div>

        </div>
    </main>

    <!-- Toast Notification Container -->
    <div id="toastContainer" class="fixed bottom-5 left-0 right-0 flex flex-col items-center justify-end pointer-events-none z-50 gap-2 px-4"></div>

    <script>
        const topicSelect = document.getElementById('topic');
        const choseongInput = document.getElementById('choseong');
        const submitBtn = document.getElementById('submitBtn');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const resultsContainer = document.getElementById('resultsContainer');
        const wordsList = document.getElementById('wordsList');
        const resultBadge = document.getElementById('resultBadge');
        const toastContainer = document.getElementById('toastContainer');

        const API_KEY = ""; // Provided by immersive environment
        let isFetching = false;

        // Custom Toast Notification Function
        function showToast(message, type = 'error') {
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-600' : 'bg-gray-800';
            
            toast.className = `${bgColor} text-white px-5 py-3 rounded-full shadow-lg text-sm font-medium toast-enter flex items-center gap-2`;
            toast.innerHTML = `
                ${type === 'error' ? '<svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>' : ''}
                <span>${message}</span>
            `;
            
            toastContainer.appendChild(toast);

            setTimeout(() => {
                toast.classList.remove('toast-enter');
                toast.classList.add('toast-exit');
                setTimeout(() => toast.remove(), 300); // Wait for exit animation
            }, 3000);
        }

        // Validate Korean Choseong
        function isValidChoseong(str) {
            // Check if string is exactly 1 character and is a Korean consonant
            if (str.length !== 1) return false;
            const regex = /^[ㄱ-ㄲㄴ-ㄷㄸㄹ-ㅁㅂㅃㅅㅆㅇ-ㅈㅉㅊ-ㅎ]+$/;
            return regex.test(str);
        }

        async function fetchChoseongWords(topic, choseong) {
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`;
            
            // Crafting a precise prompt for single starting choseong
            const prompt = `
당신은 한국어 초성 게임의 마스터입니다. 사용자가 제시한 '주제'에 맞고 주어진 '초성'으로 시작하는 단어를 딱 3개만 찾아주세요.

[규칙]
1. 주제: ${topic}
2. 시작하는 초성: ${choseong}
3. 단어 길이 제한: **모든 단어는 반드시 2글자 이상이어야 합니다. 1글자 단어는 절대 허용하지 않습니다.**
4. 초성 일치 규칙: 해당 초성으로 '시작하는' 단어여야 합니다. (예: 초성이 'ㄱ'인 경우 가방, 구두 등)
5. 만약 위 조건을 만족하는 단어가 3개가 안 된다면, 가능한 개수만큼만 반환하거나 빈 배열을 반환하세요.

오직 JSON 배열 형태로만 결과를 출력하세요.
`;

            const payload = {
                contents: [{ role: "user", parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "ARRAY",
                        items: { type: "STRING" }
                    }
                }
            };

            try {
                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API Request failed with status ${response.status}`);
                }

                const result = await response.json();
                
                // Parse the response
                if (result.candidates && result.candidates.length > 0 && 
                    result.candidates[0].content && result.candidates[0].content.parts.length > 0) {
                    const jsonText = result.candidates[0].content.parts[0].text;
                    const words = JSON.parse(jsonText);
                    return words;
                } else {
                    throw new Error("Invalid response structure from AI.");
                }

            } catch (error) {
                console.error("Error fetching words:", error);
                throw error;
            }
        }

        function renderWords(words) {
            wordsList.innerHTML = ''; // Clear previous

            if (!words || words.length === 0) {
                wordsList.innerHTML = `
                    <div class="bg-gray-50 border border-gray-200 rounded-xl p-6 text-center text-gray-500 fade-in">
                        <p class="font-medium text-lg mb-1">앗, 단어를 찾지 못했어요 😢</p>
                        <p class="text-sm">다른 자음이나 주제로 다시 시도해보세요.</p>
                    </div>
                `;
                return;
            }

            words.forEach((word, index) => {
                const delay = index * 0.1; // Staggered animation delay
                const card = document.createElement('div');
                card.className = `result-card bg-white border border-gray-200 p-4 rounded-xl flex items-center gap-4 fade-in`;
                card.style.animationDelay = `${delay}s`;
                
                // Emphasize the starting character dynamically based on length
                card.innerHTML = `
                    <div class="flex-shrink-0 w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center font-black text-xl">
                        ${index + 1}
                    </div>
                    <div class="flex-grow">
                        <p class="text-2xl font-bold text-gray-800 tracking-tight">${word}</p>
                    </div>
                `;
                wordsList.appendChild(card);
            });
        }

        async function handleSearch() {
            if (isFetching) return;

            const topic = topicSelect.value;
            let choseong = choseongInput.value.trim();

            // Validation
            if (!choseong) {
                showToast("자음을 입력해주세요!");
                choseongInput.focus();
                return;
            }

            if (!isValidChoseong(choseong)) {
                showToast("한글 자음(초성) 딱 1개만 입력 가능합니다. (예: ㄱ)");
                choseongInput.value = '';
                choseongInput.focus();
                return;
            }

            // Remove spaces from input
            choseong = choseong.replace(/\s/g, '');

            // UI State Update
            isFetching = true;
            submitBtn.disabled = true;
            submitBtn.querySelector('span').textContent = '단어 찾는 중...';
            loadingSpinner.classList.remove('hidden');
            resultsContainer.classList.add('hidden');
            resultBadge.textContent = choseong;

            try {
                // Fetch words with exponential backoff logic wrapper if needed, 
                // but direct call is used here for simplicity as per standard implementation
                const words = await fetchChoseongWords(topic, choseong);
                
                // Filter out single-character words just in case the AI hallucinates
                const validWords = words.filter(word => typeof word === 'string' && word.length >= 2).slice(0, 3);
                
                renderWords(validWords);
                resultsContainer.classList.remove('hidden');

            } catch (error) {
                showToast("단어를 가져오는 중 오류가 발생했습니다. 다시 시도해주세요.");
            } finally {
                // Reset UI State
                isFetching = false;
                submitBtn.disabled = false;
                submitBtn.querySelector('span').textContent = '단어 찾기';
                loadingSpinner.classList.add('hidden');
            }
        }

        submitBtn.addEventListener('click', handleSearch);

        choseongInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleSearch();
            }
        });

        // Auto-focus input on load
        window.onload = () => {
            choseongInput.focus();
        };
    </script>
</body>
</html>
